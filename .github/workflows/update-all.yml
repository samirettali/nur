name: Update all packages

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-all
  cancel-in-progress: false

jobs:
  update-all:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create update workspace
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B automated/update-all-workspace "origin/${DEFAULT_BRANCH}"

      - name: Run update-all
        run: NIX_PATH=nixpkgs=channel:nixpkgs-unstable ./update-all.sh

      - name: Check for new commits
        id: changes
        run: |
          commit_count=$(git rev-list --count "origin/${DEFAULT_BRANCH}..HEAD")
          echo "commit_count=${commit_count}" >> "$GITHUB_OUTPUT"

      - name: Create or update pull requests
        if: steps.changes.outputs.commit_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t commits < <(git rev-list --reverse "origin/${DEFAULT_BRANCH}..HEAD")

          for commit in "${commits[@]}"; do
            subject=$(git log -1 --format=%s "$commit")
            pkg=${subject%%:*}

            if [ -z "${pkg}" ] || [ "${pkg}" = "${subject}" ]; then
              pkg="commit-${commit:0:7}"
            fi

            branch_pkg=$(printf '%s' "${pkg}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')
            update_branch="automated/update-${branch_pkg}"

            git checkout -B "${update_branch}" "origin/${DEFAULT_BRANCH}"
            git cherry-pick "$commit"
            git push --force-with-lease origin "HEAD:${update_branch}"

            pr_title="$subject"
            printf -v pr_body 'Automated package update for `%s` generated by `.github/workflows/update-all.yml`.' "$pkg"

            pr_number=$(gh pr list \
              --head "${update_branch}" \
              --base "${DEFAULT_BRANCH}" \
              --json number \
              --jq '.[0].number')

            if [ -n "${pr_number}" ]; then
              gh pr edit "${pr_number}" \
                --title "${pr_title}" \
                --body "${pr_body}"
            else
              gh pr create \
                --base "${DEFAULT_BRANCH}" \
                --head "${update_branch}" \
                --title "${pr_title}" \
                --body "${pr_body}"
            fi
          done

      - name: No changes
        if: steps.changes.outputs.commit_count == '0'
        run: echo 'No package updates found.'
