name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  nix-build-changed-packages:
    name: Nix build (${{ matrix.nix-system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - nix-system: x86_64-linux
            runner: ubuntu-latest
          - nix-system: aarch64-darwin
            runner: macos-14-arm64
    env:
      RUNNER_NIX_SYSTEM: ${{ matrix.nix-system }}
      NIXPKGS_ALLOW_UNFREE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Determine packages to build
        id: packages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "$BASE_SHA"

          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" HEAD)
          printf 'Changed files:\n'
          printf '  %s\n' "${changed_files[@]}"

          packages=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              pkgs/*/*)
                package=${file#pkgs/}
                package=${package%%/*}
                packages+=("$package")
                ;;
            esac
          done

          # If shared Nix plumbing changed, build every package available on the runner.
          for file in "${changed_files[@]}"; do
            case "$file" in
              default.nix|flake.nix|flake.lock|overlay.nix|overlays/*|lib/*)
                mapfile -t packages < <(nix eval --impure --json ".#packages.${RUNNER_NIX_SYSTEM}" --apply 'builtins.attrNames' | jq -r '.[]')
                break
                ;;
            esac
          done

          if ((${#packages[@]})); then
            printf '%s\n' "${packages[@]}" | sort -u > packages.txt
          else
            : > packages.txt
          fi

          echo 'Packages selected for build:'
          sed 's/^/  /' packages.txt || true
          {
            echo 'list<<EOF'
            cat packages.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check runner package set evaluation
        run: nix eval --impure --json ".#packages.${RUNNER_NIX_SYSTEM}" --apply 'builtins.attrNames' >/dev/null

      - name: Build changed packages supported on runner
        if: steps.packages.outputs.list != ''
        run: |
          set -euo pipefail
          while IFS= read -r package; do
            [ -n "$package" ] || continue

            platforms=$(nix eval --impure --json ".#packages.${RUNNER_NIX_SYSTEM}.\"${package}\".meta.platforms" 2>/dev/null || echo '[]')
            if ! jq -e --arg system "$RUNNER_NIX_SYSTEM" 'length == 0 or any(. == $system)' <<<"$platforms" >/dev/null; then
              echo "Skipping $package: unsupported on $RUNNER_NIX_SYSTEM (platforms: $platforms)"
              continue
            fi

            echo "::group::nix build .#packages.${RUNNER_NIX_SYSTEM}.\"${package}\""
            nix build --impure --print-build-logs ".#packages.${RUNNER_NIX_SYSTEM}.\"${package}\""
            echo "::endgroup::"
          done < packages.txt

      - name: No package changes
        if: steps.packages.outputs.list == ''
        run: echo 'No package derivations changed; runner package set evaluation was checked.'
